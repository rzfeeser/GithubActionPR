name: Python linting

on: 
  - workflow_dispatch

jobs: 
  lintingOperation:   # this is the name of a job
    runs-on: ubuntu-latest   # this is the snowglobe to use for the work
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - uses: advanced-security/python-lint-code-scanning-action@v1
        with:
          linter: flake8
